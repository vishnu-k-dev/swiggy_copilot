<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swiggy Voice Copilot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #fc8019; /* Swiggy orange */
      --primary-hover: #e06c11;
      --bg: #0f1115;
      --chat-bg: rgba(255, 255, 255, 0.05);
      --bot-msg: rgba(255, 255, 255, 0.1);
      --user-msg: linear-gradient(135deg, #fc8019, #f96302);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      background-image: 
        radial-gradient(at 0% 0%, rgba(252, 128, 25, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(252, 128, 25, 0.1) 0px, transparent 50%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 420px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      position: relative;
    }

    .header {
      padding: 20px;
      background: rgba(15, 17, 21, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 10;
    }

    .header-logo {
      width: 40px;
      height: 40px;
      background: var(--user-msg);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 15px rgba(252, 128, 25, 0.4);
    }

    .header-info h2 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .header-info p {
      font-size: 12px;
      color: var(--primary);
      font-weight: 500;
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .status-dot {
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 8px #10b981;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }

    .chat-area {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar {
      width: 6px;
    }
    .chat-area::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .msg-wrapper {
      display: flex;
      width: 100%;
      animation: slideIn 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      opacity: 0;
      transform: translateY(10px);
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-wrapper.user {
      justify-content: flex-end;
    }

    .msg {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      position: relative;
    }

    .msg.user {
      background: var(--user-msg);
      border-bottom-right-radius: 4px;
      color: white;
      box-shadow: 0 4px 15px rgba(252, 128, 25, 0.2);
    }

    .msg.bot {
      background: var(--bot-msg);
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .msg strong {
      color: var(--primary);
    }
    
    .msg.user strong {
      color: white;
    }

    .typing-indicator {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: var(--bot-msg);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
      animation: fadeIn 0.3s forwards;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .input-area {
      padding: 15px 20px 20px;
      background: rgba(15, 17, 21, 0.8);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      display: flex;
      align-items: center;
      padding: 5px 15px;
      transition: all 0.3s ease;
    }

    .input-wrapper:focus-within {
      border-color: rgba(252, 128, 25, 0.5);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(252, 128, 25, 0.1);
    }

    input {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 15px;
      padding: 10px 0;
      outline: none;
      font-family: 'Inter', sans-serif;
    }

    input::placeholder {
      color: var(--text-muted);
    }

    .btn {
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .btn-send {
      color: var(--primary);
      font-weight: 600;
      font-size: 14px;
      padding: 10px;
      opacity: 0.5;
      pointer-events: none;
    }

    .btn-send.active {
      opacity: 1;
      pointer-events: auto;
    }

    .btn-voice {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-size: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-voice:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .btn-voice.recording {
      background: #ef4444;
      color: white;
      border-color: #ef4444;
      animation: pulse-red 1.5s infinite;
    }

    @keyframes pulse-red {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    .md-bold {
      font-weight: 700;
      color: var(--primary);
    }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <div class="header-logo">🍔</div>
    <div class="header-info">
      <h2>Swiggy Copilot</h2>
      <p><span class="status-dot"></span> AI Assistant is online</p>
    </div>
  </div>

  <div class="chat-area" id="chat">
    <div class="msg-wrapper bot">
      <div class="msg bot">Hi! I'm your Swiggy Voice Copilot. What are you craving today? You can type or use the mic!</div>
    </div>
    <div class="msg-wrapper bot typing-wrapper" id="typing-indicator" style="display: none;">
      <div class="typing-indicator" style="display: flex;">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <input type="text" id="input" placeholder="Type or speak a food request..." autocomplete="off" />
      <button class="btn btn-send" id="send-btn" onclick="send()">Send</button>
    </div>
    <button class="btn btn-voice" id="voice-btn" onclick="toggleVoice()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
        <line x1="8" y1="23" x2="16" y2="23"></line>
      </svg>
    </button>
  </div>
</div>

<script>
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");
  const voiceBtn = document.getElementById("voice-btn");
  const chatEl = document.getElementById("chat");
  const typingIndicator = document.getElementById("typing-indicator");

  function formatText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong class="md-bold">$1</strong>')
      .replace(/\n/g, '<br>');
  }

  inputEl.addEventListener("input", () => {
    if (inputEl.value.trim().length > 0) {
      sendBtn.classList.add("active");
    } else {
      sendBtn.classList.remove("active");
    }
  });

  inputEl.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
      send();
    }
  });

  function scrollToBottom() {
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function showTyping() {
    typingIndicator.style.display = "flex";
    chatEl.appendChild(typingIndicator);
    scrollToBottom();
  }

  function hideTyping() {
    typingIndicator.style.display = "none";
  }

  async function sendMessage(text) {
    if (!text.trim()) return;
    
    addMessage(text, "user");
    showTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      hideTyping();
      setTimeout(() => {
        addMessage(data.reply, "bot");
      }, 300);
    } catch (error) {
      hideTyping();
      addMessage("Sorry, I'm having trouble connecting to the server.", "bot");
    }
  }

  function addMessage(text, type) {
    const wrapper = document.createElement("div");
    wrapper.className = "msg-wrapper " + type;
    
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = formatText(text);
    
    wrapper.appendChild(div);
    chatEl.insertBefore(wrapper, typingIndicator);
    scrollToBottom();
  }

  function send() {
    const text = inputEl.value;
    if (!text.trim()) return;
    
    sendMessage(text);
    inputEl.value = "";
    sendBtn.classList.remove("active");
  }

  let recognition;
  let isRecording = false;

  if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onstart = function() {
      isRecording = true;
      voiceBtn.classList.add("recording");
      inputEl.placeholder = "Listening...";
    };

    recognition.onresult = function(event) {
      let interimTranscript = '';
      let finalTranscript = '';

      for (let i = event.resultIndex; i < event.results.length; ++i) {
        if (event.results[i].isFinal) {
          finalTranscript += event.results[i][0].transcript;
        } else {
          interimTranscript += event.results[i][0].transcript;
        }
      }
      
      if (interimTranscript) {
        inputEl.value = interimTranscript;
      }
      
      if (finalTranscript) {
        inputEl.value = finalTranscript;
        setTimeout(() => send(), 500);
      }
    };

    recognition.onerror = function(event) {
      console.error("Speech recognition error", event.error);
      stopRecording();
    };

    recognition.onend = function() {
      stopRecording();
    };
  } else {
    voiceBtn.style.display = "none";
  }

  function stopRecording() {
    isRecording = false;
    voiceBtn.classList.remove("recording");
    inputEl.placeholder = "Type or speak a food request...";
  }

  function toggleVoice() {
    if (!recognition) return alert("Speech recognition not supported in your browser.");
    
    if (isRecording) {
      recognition.stop();
    } else {
      inputEl.value = "";
      recognition.start();
    }
  }
</script>

</body>
</html>
